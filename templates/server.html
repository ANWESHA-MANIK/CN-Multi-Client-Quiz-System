<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Master | Control Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #4338ca;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(67, 56, 202, 0.15) 0px, transparent 50%);
            color: white;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Header Section */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-weight: 800;
            font-size: 2rem;
            letter-spacing: -1px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .badge {
            background: var(--glass);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            font-size: 0.8rem;
            font-weight: 600;
            color: #818cf8;
        }

        /* Stats Bar */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .stat-card span {
            display: block;
            color: #94a3b8;
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .stat-card h2 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        /* Main Display */
        .main-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .question-label {
            color: #818cf8;
            font-weight: 600;
            margin-bottom: 1rem;
            display: block;
        }

        #current-question {
            font-size: 2rem;
            font-weight: 400;
            line-height: 1.4;
            margin-bottom: 2rem;
        }

        .btn-next {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        .btn-next:hover {
            background: var(--secondary);
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.5);
        }

        .btn-next:active { transform: translateY(0); }

        /* Score Table */
        .scoreboard {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: rgba(255, 255, 255, 0.03);
            text-align: left;
            padding: 1.25rem;
            font-size: 0.8rem;
            color: #94a3b8;
            text-transform: uppercase;
        }

        td {
            padding: 1.25rem;
            border-top: 1px solid var(--glass-border);
        }

        .player-name { font-weight: 600; color: white; }
        .player-score { font-weight: 800; color: #818cf8; text-align: right; }

        .empty-state {
            padding: 3rem;
            text-align: center;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Quiz Control Panel</h1>
            <div class="badge" id="network-status">● SERVER LIVE</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <span>Current Progress</span>
                <h2 id="question-status">Question 1</h2>
            </div>
            <div class="stat-card">
                <span>Active Participants</span>
                <h2 id="client-count">0 Players</h2>
            </div>
        </div>

        <div class="main-card">
            <span class="question-label">Active Question</span>
            <div id="current-question">Waiting for clients to join...</div>
            <button class="btn-next" onclick="nextQuestion()">Push Next Question</button>
        </div>

        <div class="scoreboard">
            <table>
                <thead>
                    <tr>
                        <th>Player Name</th>
                        <th style="text-align: right;">Points Earned</th>
                    </tr>
                </thead>
                <tbody id="scores-body">
                    <tr>
                        <td colspan="2" class="empty-state">No players connected yet.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script>
        // Connect specifically to the /server namespace defined in app.py
        const socket = io('/server');
        
        socket.on('connect', () => {
            console.log('Admin connected to socket namespace');
        });

        socket.on('client_joined', (data) => {
            addOrUpdatePlayer(data.name, data.score);
            updateClientCount();
        });

        socket.on('score_update', (data) => {
            addOrUpdatePlayer(data.name, data.score);
        });

        socket.on('client_left', (data) => {
            const row = document.getElementById(`p-${data.name}`);
            if (row) row.style.opacity = '0.4'; // Visual indicator of disconnect
        });

        socket.on('question_changed', (data) => {
            document.getElementById('question-status').textContent = `Question ${data.current_question}`;
        });

        // This receives the question text from the server so we don't hardcode it
        socket.on('all_clients_next', (data) => {
            document.getElementById('current-question').textContent = data.question;
        });

        function addOrUpdatePlayer(name, score) {
            const tbody = document.getElementById('scores-body');
            const empty = tbody.querySelector('.empty-state');
            if (empty) empty.parentElement.remove();

            let row = document.getElementById(`p-${name}`);
            if (!row) {
                row = tbody.insertRow();
                row.id = `p-${name}`;
                row.innerHTML = `
                    <td class="player-name">${name}</td>
                    <td class="player-score">${score}</td>
                `;
            } else {
                row.querySelector('.player-score').textContent = score;
            }
            sortBoard();
        }

        function sortBoard() {
            const tbody = document.getElementById('scores-body');
            const rows = Array.from(tbody.rows);
            rows.sort((a, b) => {
                return parseInt(b.cells[1].textContent) - parseInt(a.cells[1].textContent);
            });
            rows.forEach(row => tbody.appendChild(row));
        }

        function updateClientCount() {
            const count = document.querySelectorAll('#scores-body tr').length;
            document.getElementById('client-count').textContent = `${count} Players`;
        }

        function nextQuestion() {
            socket.emit('start_quiz');
        }
    </script>
</body>
</html>
