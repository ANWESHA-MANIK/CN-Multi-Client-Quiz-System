<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Portal | Active Session</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --secondary: #d946ef;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .quiz-container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            width: 100%;
            max-width: 600px;
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .player-info h3 { font-size: 0.9rem; color: #94a3b8; font-weight: 400; }
        .player-info p { font-weight: 700; color: white; }

        .score-pill {
            background: rgba(139, 92, 246, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            border: 1px solid var(--primary);
            font-weight: 700;
            color: #c4b5fd;
        }

        .question-box { margin-bottom: 1rem; }

        .q-num {
            display: inline-block;
            color: var(--primary);
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .q-text {
            font-size: 1.5rem;
            font-weight: 500;
            line-height: 1.4;
        }

        /* 🔥 TIMER STYLE */
        #timer {
            font-size: 2.2rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 1rem;
            color: #4ade80;
        }

        .input-group { margin-bottom: 1.5rem; }

        input[type="text"] {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem;
            color: white;
            font-size: 1.1rem;
        }

        button {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: none;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
        }

        .status-msg {
            text-align: center;
            padding: 2rem 0;
        }

        .result-screen h2 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: #a78bfa;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="top-bar">
        <div class="player-info">
            <h3>PARTICIPANT</h3>
            <p>{{ name }}</p>
        </div>
        <div class="score-pill">Score: <span id="current-score">0</span></div>
    </div>

    <div id="quiz-area">
        <div class="status-msg">
            <p>Waiting for question...</p>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
<script>
const socket = io(window.location.origin);
const playerName = "{{ name }}";
let timerInterval;

socket.on("connect", () => {
    socket.emit("join_quiz", { name: playerName });
});

// 🔥 QUESTION + TIMER
socket.on("all_clients_next", (data) => {
    renderQuestion(data);
    startTimer(data.time_left || 10);
});

// 🔥 SCORE UPDATE
socket.on("score_update", (data) => {
    if (data.name === playerName) {
        document.getElementById("current-score").textContent = data.score;
    }
});

// 🔥 QUIZ END
socket.on("quiz_completed", () => {
    showFinal();
});

function renderQuestion(data) {
    document.getElementById('quiz-area').innerHTML = `
        <div class="question-box">
            <span class="q-num">Question ${data.number}</span>
            <p class="q-text">${data.question}</p>
        </div>

        <div id="timer">${data.time_left || 10}s</div>

        <div class="input-group">
            <input type="text" id="ans-input" placeholder="Type your answer...">
        </div>

        <button id="submit-btn" onclick="submitAnswer()">Submit</button>
    `;

    document.getElementById("ans-input").focus();
}

// ⏱️ TIMER
function startTimer(time) {
    clearInterval(timerInterval);

    let t = time;

    timerInterval = setInterval(() => {
        t--;

        const timerEl = document.getElementById("timer");

        if (timerEl) {
            timerEl.innerText = t + "s";

            // 🎨 color changes
            if (t > 5) timerEl.style.color = "#4ade80";     // green
            else if (t > 2) timerEl.style.color = "#facc15"; // yellow
            else timerEl.style.color = "#f87171";           // red
        }

        if (t <= 0) {
            clearInterval(timerInterval);

            const input = document.getElementById("ans-input");
            const btn = document.getElementById("submit-btn");

            let val = "";
            if (input) val = input.value;

            //AUTO SUBMIT
            socket.emit("submit_answer", { answer: val });

            //disable after submit
            if (input) input.disabled = true;
            if (btn) btn.disabled = true;

            //small delay to avoid UI conflict
            setTimeout(() => {
                const quizArea = document.getElementById("quiz-area");
                if (quizArea) {
                    quizArea.innerHTML = `
                        <button disabled>Time's Up! Answer Submitted</button>
                        <div class="status-msg">
                            <p>Waiting for next question...</p>
                        </div>
                    `;
                }
            }, 200);
        }

    }, 1000);
}

//SUBMIT
function submitAnswer() {
    const val = document.getElementById("ans-input").value;
    if (!val.trim()) return;

    socket.emit("submit_answer", { answer: val });

    document.getElementById("submit-btn").disabled = true;

    document.getElementById('quiz-area').innerHTML = `
        <button disabled>Answer Submitted</button>
        <div class="status-msg">
            <p>Waiting for next question...</p>
        </div>
    `;
}

// 🎯 FINAL
function showFinal() {
    document.getElementById('quiz-area').innerHTML = `
        <div class="status-msg result-screen">
            <h2>Quiz Completed!</h2>
            <p>Great job!</p>
        </div>
    `;
}
</script>

</body>
</html>
