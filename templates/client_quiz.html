<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Portal | Active Session</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --secondary: #d946ef;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .quiz-container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            width: 100%;
            max-width: 600px;
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .player-info h3 { font-size: 0.9rem; color: #94a3b8; font-weight: 400; }
        .player-info p { font-weight: 700; color: white; }

        .score-pill {
            background: rgba(139, 92, 246, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            border: 1px solid var(--primary);
            font-weight: 700;
            color: #c4b5fd;
        }

        /* Question Area */
        .question-box { margin-bottom: 2rem; }
        .q-num {
            display: inline-block;
            color: var(--primary);
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }
        .q-text {
            font-size: 1.5rem;
            font-weight: 500;
            line-height: 1.4;
        }

        /* Input Styling */
        .input-group { position: relative; margin-bottom: 1.5rem; }
        input[type="text"] {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            color: white;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.2);
        }

        button {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: none;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* Waiting/Result States */
        .status-msg {
            text-align: center;
            padding: 2rem 0;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--glass-border);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .result-screen h2 { font-size: 2.5rem; margin-bottom: 1rem; color: #a78bfa; }
        .result-screen p { font-size: 1.1rem; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div class="top-bar">
            <div class="player-info">
                <h3>PARTICIPANT</h3>
                <p>{{ name }}</p>
            </div>
            <div class="score-pill">Score: <span id="current-score">0</span></div>
        </div>

        <div id="quiz-area">
            <div class="status-msg">
                <div class="spinner"></div>
                <p>Establishing Secure Link...</p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script>
        const socket = io();
        const playerName = "{{ name }}";
        let score = 0;

        socket.on('connect', () => {
            socket.emit('join_quiz', { name: playerName });
        });

        socket.on('question', (data) => {
            renderQuestion(data);
        });

        socket.on('all_clients_next', (data) => {
            renderQuestion(data);
        });

        socket.on('result_all', () => {
            showFinal();
        });

        function renderQuestion(data) {
            document.getElementById('quiz-area').innerHTML = `
                <div class="question-box">
                    <span class="q-num">Question ${data.number}</span>
                    <p class="q-text">${data.question}</p>
                </div>
                <div class="input-group">
                    <input type="text" id="ans-input" placeholder="Type your answer here..." autocomplete="off">
                </div>
                <button id="submit-btn" onclick="submitAnswer()">Submit Response</button>
            `;
            const input = document.getElementById('ans-input');
            input.focus();
            input.addEventListener('keypress', (e) => { if(e.key === 'Enter') submitAnswer(); });
        }

        function submitAnswer() {
            const val = document.getElementById('ans-input').value;
            if(!val.trim()) return;

            document.getElementById('submit-btn').disabled = true;
            document.getElementById('submit-btn').innerText = "Encrypted & Sent";
            
            socket.emit('submit_answer', { answer: val });

            document.getElementById('quiz-area').innerHTML = `
                <div class="status-msg">
                    <div class="spinner"></div>
                    <p>Answer Locked. Waiting for the next question...</p>
                </div>
            `;
        }

        // Live score updates from the server
        socket.on('score_update', (data) => {
            if(data.name === playerName) {
                score = data.score;
                document.getElementById('current-score').textContent = score;
            }
        });

        function showFinal() {
            document.getElementById('quiz-area').innerHTML = `
                <div class="status-msg result-screen">
                    <h2>Quiz Finished!</h2>
                    <p>Excellent performance. The administrator will announce the final rankings shortly.</p>
                </div>
            `;
        }
    </script>
</body>
</html>
